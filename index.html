<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/app-icon.png">
    <link rel="stylesheet" href="./tarmeez-library.css">
    <title>Tarmeez library guide</title>
    <style>
        .wrapper  {
            display: flex;
        }
        #tableLinks {
            width: 100%;
            height: calc(100vh - 9vh);
            overflow-y: scroll;
            display: flex;
            flex-direction: column;
            row-gap: 5px;
            padding-right: 10px;
        }
        #tableLinks * {
            cursor: pointer;
        }
        #pagesContainer {
            height: calc(100vh - 9vh);
        }
    </style>
</head>

<body>

    <main>
        
        <article>
            <div id="pageCounter"></div>
            <div class="wrapper">
                <div id="bookViewer"></div>
                <div id="tableLinks"></div>
            </div>
        </article>
    </main>
    <script src="./tarmeez-library.js"></script>
    <script src="./script.js"></script>
</body>

</html>
